                }).join("") +
              '</div>' +
            '</section>' +
            '<section class="section" id="' + sectionIds.stack + '">' +
              '<h2>' + escapeHtml(t.stackTitle) + '</h2>' +
              '<div class="stack-wrap">' +
                t.stack.map(function (skill) { return '<span class="chip">' + escapeHtml(skill) + '</span>'; }).join("") +
              '</div>' +
            '</section>' +
            '<section class="section contact" id="' + sectionIds.contact + '">' +
              '<h2>' + escapeHtml(t.contactTitle) + '</h2>' +
              '<p>' + escapeHtml(t.contactText) + '</p>' +
              '<div class="contact-links">' +
                '<a href="mailto:delgadofernandez.luis.com">delgadofernandez.luis.com</a>' +
                '<a href="https://www.linkedin.com/in/luisdelgadofernandez/" target="_blank" rel="noopener noreferrer">LinkedIn</a>' +
              '</div>' +
            '</section>' +
          '</main>';
      }

      function buildCvHtml(t, lang) {
        var experience = t.jobs.map(function (job) {
          return '' +
            '<article class="cv-item">' +
              '<h3>' + escapeHtml(job.role) + '</h3>' +
              '<p class="muted"><strong>' + escapeHtml(job.company) + '</strong> | ' + escapeHtml(job.period) + '</p>' +
              '<p>' + escapeHtml(job.description) + '</p>' +
              '<ul>' + job.achievements.map(function (a) { return '<li>' + escapeHtml(a) + '</li>'; }).join("") + '</ul>' +
            '</article>';
        }).join("");

        var projects = t.projects.map(function (project) {
          var link = project.link ? '<p><strong>URL:</strong> ' + escapeHtml(project.link) + '</p>' : "";
          return '' +
            '<article class="cv-item">' +
              '<h3>' + escapeHtml(project.name) + '</h3>' +
              '<p>' + escapeHtml(project.description) + '</p>' +
              '<p><strong>Stack:</strong> ' + escapeHtml(project.stack) + '</p>' +
              link +
            '</article>';
        }).join("");

        return '<!DOCTYPE html>' +
          '<html lang="' + escapeHtml(t.lang) + '">' +
          '<head>' +
            '<meta charset="UTF-8">' +
            '<meta name="viewport" content="width=device-width, initial-scale=1.0">' +
            '<title>' + escapeHtml(t.cvHeadline + " - " + t.siteName) + '</title>' +
            '<style>' +
              'body{margin:0;background:#f4f6f8;color:#1a1a1a;font-family:"Segoe UI",Arial,sans-serif;line-height:1.5;}' +
              '@page{size:A4;margin:14mm;}' +
              '.cv{max-width:900px;margin:32px auto;background:#fff;border:1px solid #d6dce3;padding:34px 38px;box-shadow:0 8px 20px rgba(10,20,30,.06);}' +
              '.header{border-bottom:2px solid #e4e9ef;padding-bottom:14px;margin-bottom:20px;}' +
              'h1{margin:0;font-size:30px;letter-spacing:.3px;}h2{font-size:17px;margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid #e6ebf1;}' +
              'h3{font-size:16px;margin:0 0 4px;}p{margin:6px 0;}ul{margin:8px 0 0;padding-left:20px;}' +
              'li{margin-bottom:4px;}.muted{color:#4f5f73;}.chips{display:flex;flex-wrap:wrap;gap:7px;}' +
              '.chip{border:1px solid #c9d3dd;border-radius:4px;padding:4px 8px;font-size:13px;background:#f7f9fb;}' +
              '.cv-item{margin-bottom:14px;}@media print{body{background:#fff;}.cv{margin:0;box-shadow:none;border:0;padding:0;}}' +
            '</style>' +
          '</head>' +
          '<body>' +
            '<main class="cv">' +
              '<header class="header">' +
                '<h1>' + escapeHtml(t.siteName) + '</h1>' +
                '<p class="muted">' + escapeHtml(t.roleLine) + '</p>' +
              '</header>' +
              '<section>' +
                '<h2>' + escapeHtml(t.cvSummaryTitle) + '</h2>' +
                '<p>' + escapeHtml(t.summary) + '</p>' +
              '</section>' +
              '<section>' +
                '<h2>' + escapeHtml(t.cvExperienceTitle) + '</h2>' +
                experience +
              '</section>' +
              '<section>' +
                '<h2>' + escapeHtml(t.cvProjectsTitle) + '</h2>' +
                projects +
              '</section>' +
              '<section>' +
                '<h2>' + escapeHtml(t.cvSkillsTitle) + '</h2>' +
                '<div class="chips">' + t.stack.map(function (skill) { return '<span class="chip">' + escapeHtml(skill) + '</span>'; }).join("") + '</div>' +
              '</section>' +
              '<section>' +
                '<h2>' + escapeHtml(t.cvContactTitle) + '</h2>' +
                '<p>Email: delgadofernandez.luisdesarrollo.com</p>' +
                '<p>LinkedIn: https://www.linkedin.com/in/luisdelgadofernandez/</p>' +
              '</section>' +
            '</main>' +
          '</body>' +
          '</html>';
      }

      function downloadCvPdf(lang) {
        var t = translations[lang] || translations.es;
        var cvHtml = buildCvHtml(t, lang);
        var printWindow = window.open("", "_blank", "noopener,noreferrer,width=1024,height=768");
        if (!printWindow) return;
        printWindow.document.open();
        printWindow.document.write(cvHtml);
        printWindow.document.close();
        printWindow.focus();
        setTimeout(function () {
          printWindow.print();
        }, 250);
      }

      function updateSeo(t, lang) {
        var path = window.location.pathname || "/";
        var canonical = window.location.origin + path;

        document.documentElement.setAttribute("lang", t.lang);
        document.title = t.seoTitle;

        var metaDescription = document.querySelector('meta[name="description"]');
        var metaKeywords = document.querySelector('meta[name="keywords"]');
        var ogTitle = document.querySelector('meta[property="og:title"]');
        var ogDescription = document.querySelector('meta[property="og:description"]');
        var ogLocale = document.querySelector('meta[property="og:locale"]');
        var ogUrl = document.querySelector('meta[property="og:url"]');
        var twitterTitle = document.querySelector('meta[name="twitter:title"]');
        var twitterDescription = document.querySelector('meta[name="twitter:description"]');
        var canonicalTag = document.querySelector('link[rel="canonical"]');
        var ldTag = document.getElementById("ld-json");

        if (metaDescription) metaDescription.setAttribute("content", t.seoDescription);
        if (metaKeywords) metaKeywords.setAttribute("content", t.seoKeywords);
        if (ogTitle) ogTitle.setAttribute("content", t.seoTitle);
        if (ogDescription) ogDescription.setAttribute("content", t.seoDescription);
        if (ogLocale) ogLocale.setAttribute("content", t.locale);
        if (ogUrl) ogUrl.setAttribute("content", canonical);
        if (twitterTitle) twitterTitle.setAttribute("content", t.seoTitle);
        if (twitterDescription) twitterDescription.setAttribute("content", t.seoDescription);
        if (canonicalTag) canonicalTag.setAttribute("href", canonical);

        if (ldTag) {
          ldTag.textContent = JSON.stringify({
            "@context": "https://schema.org",
            "@type": "Person",
            name: t.siteName,
            jobTitle: lang === "en" ? "Backend Developer and Java Developer" : "Programador Backend y Desarrollador Java",
            description: t.seoDescription,
            url: canonical,
            sameAs: ["https://www.linkedin.com/in/luisdelgadofernandez/"],
            knowsAbout: ["Java", "Spring Boot", "Backend development", "REST APIs", "Microservices", "Docker", "Azure DevOps"]
          });
        }
      }

      function attachEvents() {
        document.querySelectorAll("[data-scroll]").forEach(function (link) {
          link.addEventListener("click", function (event) {
            event.preventDefault();
            var href = link.getAttribute("href");
            if (!href || href.charAt(0) !== "#") return;
            var section = document.getElementById(href.slice(1));
            if (section) section.scrollIntoView({ behavior: "smooth", block: "start" });
          });
        });

        var select = document.getElementById("language-select");
        if (select) {
          select.addEventListener("change", function () {
            var selected = select.value === "en" ? "en" : "es";
            var nextPath = targetPath(selected);
            if (window.location.pathname !== nextPath) {
              window.history.pushState({}, "", nextPath);
            }
            render(selected);
          });
        }

        var downloadButton = document.querySelector("[data-download-cv]");
        if (downloadButton) {
          downloadButton.addEventListener("click", function () {
            var lang = detectLang(window.location.pathname);
            downloadCvPdf(lang);
          });
        }
      }

      function render(explicitLang) {
        var lang = explicitLang || detectLang(window.location.pathname);
        var t = translations[lang];
        var app = document.getElementById("app");
        if (!app || !t) return;

        app.innerHTML = buildMarkup(t, lang);
        updateSeo(t, lang);
        attachEvents();
      }

      window.addEventListener("popstate", function () {
        render();
      });

      render();
    })();
  </script>
</body>
</html>
